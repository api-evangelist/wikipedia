          required: true
          description: date path parameter
        - name: hour
          in: path
          type: string
          required: true
          description: hour path parameter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: downloadrealtimebatch
      path: /v2/batches/{date}/{hour}/{identifier}/download
