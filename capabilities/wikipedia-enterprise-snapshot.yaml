      - name: downloadRealtimeBatch
        method: GET
        description: Download a realtime batch
        inputParameters:
        - name: date
          in: path
          type: string
          required: true
          description: date path parameter
        - name: hour
          in: path
          type: string
          required: true
          description: hour path parameter
        - name: identifier
          in: path
          type: string
          required: true
          description: identifier path parameter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WIKIMEDIA_ENTERPRISE_TOKEN}}'
