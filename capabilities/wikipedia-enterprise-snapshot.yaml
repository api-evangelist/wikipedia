naftiko: 1.0.0-alpha2
info:
  label: Wikimedia Enterprise Snapshot And Realtime
  description: 'Commercial Wikimedia Enterprise surface: list / download Snapshot batches, fetch On-demand articles and structured contents, list realtime batches. Self-contained Naftiko capability covering
    one Wikimedia Enterprise business surface.'
  tags:
  - Wikimedia Enterprise
  - Snapshot
  - Realtime
  created: '2026-05-29'
  modified: '2026-05-29'
binds:
- namespace: env
  keys:
    WIKIMEDIA_ENTERPRISE_TOKEN: WIKIMEDIA_ENTERPRISE_TOKEN
capability:
  consumes:
  - type: http
    namespace: wikipedia-enterprise-snapshot
    baseUri: https://api.enterprise.wikimedia.com
    description: Wikimedia Enterprise Snapshot And Realtime business capability. Self-contained, no shared references.
    resources:
    - name: listcodes
      path: /v2/codes
      operations:
      - name: listCodes
        method: GET
        description: List enterprise content codes
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: listlanguages
      path: /v2/languages
      operations:
      - name: listLanguages
        method: GET
        description: List supported languages
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: listprojects
      path: /v2/projects
      operations:
      - name: listProjects
        method: GET
        description: List Wikimedia projects
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: listnamespaces
      path: /v2/namespaces
      operations:
      - name: listNamespaces
        method: GET
        description: List MediaWiki namespaces
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: listsnapshots
      path: /v2/snapshots
      operations:
      - name: listSnapshots
        method: GET
        description: List available snapshots
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: getsnapshot
      path: /v2/snapshots/{identifier}
      operations:
      - name: getSnapshot
        method: GET
        description: Get a snapshot manifest
        inputParameters:
        - name: identifier
          in: path
          type: string
          required: true
          description: identifier path parameter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: downloadsnapshot
      path: /v2/snapshots/{identifier}/download
      operations:
      - name: downloadSnapshot
        method: GET
        description: Download a snapshot
        inputParameters:
        - name: identifier
          in: path
          type: string
          required: true
          description: identifier path parameter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: listsnapshotchunks
