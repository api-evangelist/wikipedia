          type: object
          value: $.
    - name: getondemandarticle
      path: /v2/articles/{name}
      operations:
      - name: getOnDemandArticle
        method: POST
        description: On-demand article retrieval
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
          description: name path parameter
        - name: body
          in: body
          type: object
          required: false
          description: Request body payload
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: getondemandstructuredcontent
      path: /v2/structured-contents/{name}
      operations:
      - name: getOnDemandStructuredContent
        method: POST
        description: On-demand structured-contents retrieval
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
          description: name path parameter
        - name: body
          in: body
          type: object
          required: false
          description: Request body payload
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: getwikidataitem
      path: /v2/wikidata/items/{identifier}
      operations:
