        method: POST
        description: Fetch a Wikidata item by ID
        inputParameters:
        - name: identifier
          in: path
          type: string
          required: true
          description: identifier path parameter
        - name: body
          in: body
          type: object
          required: false
          description: Request body payload
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: getwikidataproperty
      path: /v2/wikidata/properties/{identifier}
      operations:
