        inputParameters:
        - name: identifier
          in: path
          type: string
          required: true
          description: identifier path parameter
        - name: body
          in: body
          type: object
          required: false
          description: Request body payload
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: getwikidatalabel
      path: /v2/wikidata/labels/{identifier}
      operations:
      - name: getWikidataLabel
        method: POST
        description: Fetch a Wikidata label by ID
        inputParameters:
        - name: identifier
          in: path
          type: string
          required: true
          description: identifier path parameter
        - name: body
          in: body
          type: object
          required: false
          description: Request body payload
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: listrealtimebatches
      path: /v2/batches/{date}/{hour}
      operations:
      - name: listRealtimeBatches
        method: GET
        description: List realtime batches for a date/hour
