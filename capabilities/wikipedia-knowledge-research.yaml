naftiko: 1.0.0-alpha2
info:
  label: Wikipedia Knowledge Research
  description: 'Read-only research surface across Wikipedia: search pages, fetch page summaries, full HTML, history, and revisions. Self-contained Naftiko capability covering one Wikipedia / MediaWiki business
    surface.'
  tags:
  - Wikipedia
  - Read
  - Research
  created: '2026-05-29'
  modified: '2026-05-29'
binds: []
capability:
  consumes:
  - type: http
    namespace: wikipedia-knowledge-research
    baseUri: https://en.wikipedia.org
    description: Wikipedia Knowledge Research business capability. Self-contained, no shared references.
    resources:
    - name: searchpages
      path: /w/rest.php/v1/search/page
      operations:
      - name: searchPages
        method: GET
        description: Full-text search of wiki pages
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: searchtitles
      path: /w/rest.php/v1/search/title
      operations:
      - name: searchTitles
        method: GET
        description: Auto-complete title search
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: getpage
      path: /w/rest.php/v1/page/{title}
      operations:
      - name: getPage
        method: GET
        description: Get page source and metadata
        inputParameters:
        - name: title
          in: path
          type: string
          required: true
          description: title path parameter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: getpagebare
      path: /w/rest.php/v1/page/{title}/bare
      operations:
      - name: getPageBare
        method: GET
        description: Get page metadata without content
        inputParameters:
        - name: title
          in: path
          type: string
          required: true
          description: title path parameter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: getpagehtml
      path: /w/rest.php/v1/page/{title}/html
      operations:
      - name: getPageHtml
        method: GET
        description: Get page as HTML
        inputParameters:
        - name: title
          in: path
          type: string
          required: true
          description: title path parameter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: getpagehistory
      path: /w/rest.php/v1/page/{title}/history
      operations:
      - name: getPageHistory
        method: GET
        description: Get page revision history
        inputParameters:
        - name: title
          in: path
          type: string
          required: true
          description: title path parameter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: getrevision
      path: /w/rest.php/v1/revision/{id}
      operations:
      - name: getRevision
        method: GET
        description: Get revision with HTML
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: id path parameter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: getpagesummary
      path: /api/rest_v1/page/summary/{title}
      operations:
      - name: getPageSummary
        method: GET
        description: Get page summary (REST v1 cached endpoint)
        inputParameters:
        - name: title
          in: path
          type: string
          required: true
          description: title path parameter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: getrelatedpages
      path: /api/rest_v1/page/related/{title}
      operations:
      - name: getRelatedPages
        method: GET
        description: Get related pages
        inputParameters:
        - name: title
          in: path
          type: string
          required: true
          description: title path parameter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: getrandompagesummary
      path: /api/rest_v1/page/random/summary
      operations:
      - name: getRandomPageSummary
        method: GET
        description: Get a random page summary
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: wikipedia-knowledge-research-rest
    port: 8080
    description: REST adapter for Wikipedia Knowledge Research. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/search/page
      name: searchpages
      description: Full-text search of wiki pages
      operations:
      - method: GET
        name: searchPages
        description: Full-text search of wiki pages
        call: wikipedia-knowledge-research.searchPages
        with: {}
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/search/title
      name: searchtitles
      description: Auto-complete title search
      operations:
      - method: GET
        name: searchTitles
        description: Auto-complete title search
        call: wikipedia-knowledge-research.searchTitles
        with: {}
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/page/{title}
      name: getpage
      description: Get page source and metadata
      operations:
      - method: GET
        name: getPage
        description: Get page source and metadata
        call: wikipedia-knowledge-research.getPage
        with:
          title: rest.title
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/page/{title}/bare
      name: getpagebare
      description: Get page metadata without content
      operations:
      - method: GET
        name: getPageBare
        description: Get page metadata without content
        call: wikipedia-knowledge-research.getPageBare
        with:
          title: rest.title
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/page/{title}/html
      name: getpagehtml
      description: Get page as HTML
      operations:
      - method: GET
        name: getPageHtml
        description: Get page as HTML
        call: wikipedia-knowledge-research.getPageHtml
        with:
          title: rest.title
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/page/{title}/history
      name: getpagehistory
      description: Get page revision history
      operations:
      - method: GET
        name: getPageHistory
        description: Get page revision history
        call: wikipedia-knowledge-research.getPageHistory
        with:
          title: rest.title
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/revision/{id}
      name: getrevision
      description: Get revision with HTML
      operations:
      - method: GET
        name: getRevision
        description: Get revision with HTML
        call: wikipedia-knowledge-research.getRevision
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/rest-v1/page/summary/{title}
      name: getpagesummary
      description: Get page summary (REST v1 cached endpoint)
      operations:
      - method: GET
        name: getPageSummary
        description: Get page summary (REST v1 cached endpoint)
        call: wikipedia-knowledge-research.getPageSummary
        with:
          title: rest.title
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/rest-v1/page/related/{title}
      name: getrelatedpages
      description: Get related pages
      operations:
      - method: GET
        name: getRelatedPages
        description: Get related pages
        call: wikipedia-knowledge-research.getRelatedPages
        with:
          title: rest.title
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/rest-v1/page/random/summary
      name: getrandompagesummary
      description: Get a random page summary
      operations:
      - method: GET
        name: getRandomPageSummary
        description: Get a random page summary
        call: wikipedia-knowledge-research.getRandomPageSummary
        with: {}
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: wikipedia-knowledge-research-mcp
    port: 9090
    transport: http
    description: MCP adapter for Wikipedia Knowledge Research. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: full-text-search-wiki-pages
      description: Full-text search of wiki pages
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: wikipedia-knowledge-research.searchPages
      with: {}
      outputParameters:
      - type: object
        mapping: $.
    - name: auto-complete-title-search
      description: Auto-complete title search
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: wikipedia-knowledge-research.searchTitles
      with: {}
      outputParameters:
      - type: object
        mapping: $.
    - name: get-page-source-metadata
      description: Get page source and metadata
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: wikipedia-knowledge-research.getPage
      with:
        title: tools.title
      outputParameters:
      - type: object
        mapping: $.
    - name: get-page-metadata-without-content
      description: Get page metadata without content
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: wikipedia-knowledge-research.getPageBare
      with:
        title: tools.title
      outputParameters:
      - type: object
        mapping: $.
    - name: get-page-html
      description: Get page as HTML
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: wikipedia-knowledge-research.getPageHtml
      with:
        title: tools.title
      outputParameters:
      - type: object
        mapping: $.
    - name: get-page-revision-history
      description: Get page revision history
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: wikipedia-knowledge-research.getPageHistory
      with:
        title: tools.title
      outputParameters:
      - type: object
        mapping: $.
    - name: get-revision-html
      description: Get revision with HTML
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: wikipedia-knowledge-research.getRevision
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-page-summary-rest-v
      description: Get page summary (REST v1 cached endpoint)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: wikipedia-knowledge-research.getPageSummary
      with:
        title: tools.title
      outputParameters:
      - type: object
        mapping: $.
    - name: get-related-pages
      description: Get related pages
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: wikipedia-knowledge-research.getRelatedPages
      with:
        title: tools.title
      outputParameters:
      - type: object
        mapping: $.
    - name: get-random-page-summary
      description: Get a random page summary
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: wikipedia-knowledge-research.getRandomPageSummary
      with: {}
      outputParameters:
      - type: object
        mapping: $.
