provider: Wikimedia Enterprise
providerId: wikipedia
created: '2026-05-29'
modified: '2026-05-29'
reconciled: true

tags:
  - FinOps
  - FOCUS
  - Enterprise
  - Open Knowledge
  - Snapshot
  - Realtime

description: >-
  FOCUS-aligned FinOps for Wikimedia Enterprise - the commercial tier operated by Wikimedia LLC.
  Pricing is data-egress based above the free allocation; paid plans add unlimited usage, daily
  snapshots, realtime streaming, and up to 99% SLA. The native Wikimedia Foundation APIs
  (Action / Core REST / REST v1 / SPARQL / EventStreams) remain free at point of use and do not
  produce billing lines.

sources:
  - https://enterprise.wikimedia.com/pricing/
  - https://enterprise.wikimedia.com/docs/
  - https://focus.finops.org/focus-specification/v1-3/

alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/

publisherName: Wikimedia LLC
serviceCategory: Open Knowledge Data Feeds

billingModel:
  pricingCategory: Pay-As-You-Go (Data Egress)
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Adjustment
    - Credit

focusColumns:
  ServiceName: Wikimedia Enterprise
  ServiceCategory: Open Knowledge Data Feeds
  ServiceSubcategory: Snapshot / On-demand / Realtime
  ProviderName: Wikimedia LLC
  PublisherName: Wikimedia LLC
